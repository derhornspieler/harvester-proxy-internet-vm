# npm.example.com — npm registry proxy cache
# Proxies https://registry.npmjs.org
# Usage: npm config set registry https://npm.example.com/
#   or:  echo 'registry=https://npm.example.com/' >> .npmrc
server {
    listen 443 ssl;
    server_name npm.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    location / {
        proxy_pass https://registry.npmjs.org;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache npm_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # Tarballs can be large
        proxy_max_temp_file_size 512m;
    }
}
