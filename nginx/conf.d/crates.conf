# crates.example.com — Rust crates.io proxy cache
# Proxies https://crates.io and https://static.crates.io
# Usage:
#   export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse
#   In ~/.cargo/config.toml:
#   [source.crates-io]
#   replace-with = "internal"
#   [source.internal]
#   registry = "sparse+https://crates.example.com/api/v1/crates/"
server {
    listen 443 ssl;
    server_name crates.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # Sparse index API (default since Rust 1.70)
    location /api/v1/crates/ {
        proxy_pass https://index.crates.io/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache crates_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Crate downloads (static.crates.io)
    location /api/v1/crates/download/ {
        proxy_pass https://static.crates.io/crates/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache crates_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_max_temp_file_size 256m;
    }
}
