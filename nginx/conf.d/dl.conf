# dl.example.com — Cloud images and ISO proxy
server {
    listen 443 ssl;
    server_name dl.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # Rocky 9 cloud images (qcow2) and ISOs
    location /rocky/9/ {
        proxy_pass https://dl.rockylinux.org/pub/rocky/9/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache downloads_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # Allow large files (qcow2 images can be 1-2GB)
        proxy_max_temp_file_size 4096m;
    }
}
