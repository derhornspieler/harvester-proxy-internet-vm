# charts.example.com — Helm HTTP repository proxy (11 upstreams)
# Mirrors chart .tgz downloads to helm-sync sidecar for Harbor OCI push.
server {
    listen 443 ssl;
    server_name charts.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # Internal mirror endpoint — fire-and-forget to helm-sync sidecar
    # Use variable so nginx resolves at request time, not startup
    set $helm_sync_upstream http://helm-sync:8888;
    location = /mirror-sync {
        internal;
        proxy_pass $helm_sync_upstream/sync;
        proxy_set_header X-Original-URI $request_uri;
        proxy_connect_timeout 1s;
        proxy_read_timeout 1s;
        proxy_send_timeout 1s;
    }

    # cert-manager
    location /jetstack/ {
        mirror /mirror-sync;
        mirror_request_body off;
        proxy_pass https://charts.jetstack.io/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache charts_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # cloudnative-pg
    location /cnpg/ {
        mirror /mirror-sync;
        mirror_request_body off;
        proxy_pass https://cloudnative-pg.github.io/charts/;
        include /etc/nginx/includes/proxy-defaults.conf;
