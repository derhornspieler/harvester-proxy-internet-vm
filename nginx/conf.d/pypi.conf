# pypi.example.com — PyPI package proxy cache
# Proxies https://pypi.org and https://files.pythonhosted.org
# Usage: pip install --index-url https://pypi.example.com/simple/ <package>
#   or:  PIP_INDEX_URL=https://pypi.example.com/simple/
server {
    listen 443 ssl;
    server_name pypi.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # PyPI simple API (package index)
    location /simple/ {
        proxy_pass https://pypi.org/simple/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache pypi_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # PyPI JSON API (package metadata)
    location /pypi/ {
        proxy_pass https://pypi.org/pypi/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache pypi_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Package file downloads (files.pythonhosted.org)
    location /packages/ {
        proxy_pass https://files.pythonhosted.org/packages/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache pypi_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # Wheels and tarballs can be large
        proxy_max_temp_file_size 512m;
    }
}
