# bin.example.com — Static binary file server
# Pre-downloaded GitHub releases served locally (GitHub 302 redirects break proxy_pass)
server {
    listen 443 ssl;
    server_name bin.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    root /srv/bin;
    autoindex off;

    location / {
        try_files $uri =404;

        # Binary files — cache indefinitely in client
        add_header Cache-Control "public, max-age=86400, immutable";
    }
}
