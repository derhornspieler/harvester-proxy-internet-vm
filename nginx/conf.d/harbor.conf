# harbor.example.com — Reverse proxy to co-located Harbor instance
# Enable this when Harbor is installed on the same VM (internal mode).
# Harbor's official installer runs its own docker-compose on port 8080.
# This vhost provides TLS termination via the proxy's shared certificate.
#
# To disable: rename to harbor.conf.disabled or delete this file.
# If Harbor is external, this vhost will return 502 (harmless).

server {
    listen 443 ssl;
    server_name harbor.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    client_max_body_size 0;
    proxy_buffering off;
    proxy_request_buffering off;

    proxy_read_timeout 900s;
    proxy_send_timeout 900s;

    location / {
        proxy_pass http://172.16.3.200:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection        "";
        chunked_transfer_encoding          on;
    }

    location /v2/ {
        proxy_pass http://172.16.3.200:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection        "";
        chunked_transfer_encoding          on;

        # Large layer uploads
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
