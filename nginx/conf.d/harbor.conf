# harbor.example.com — TLS termination for Harbor registry
# Harbor runs in HTTP mode on port 8080; nginx handles TLS on 443.
server {
    listen 443 ssl;
    server_name harbor.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # Harbor needs large uploads for container image layers
    client_max_body_size 0;

    # Disable buffering for streaming
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        # Set to your Harbor HTTP backend IP/hostname
        proxy_pass http://harbor-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Chunked transfer for Docker registry protocol
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Long timeouts for large layer uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
