# maven.example.com — Maven Central repository proxy cache
# Proxies https://repo1.maven.org/maven2
# Usage in settings.xml:
#   <mirror>
#     <id>internal-maven</id>
#     <url>https://maven.example.com/maven2/</url>
#     <mirrorOf>central</mirrorOf>
#   </mirror>
# Or for Gradle: maven { url = uri("https://maven.example.com/maven2/") }
server {
    listen 443 ssl;
    server_name maven.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # Maven Central
    location /maven2/ {
        proxy_pass https://repo1.maven.org/maven2/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache maven_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # JARs can be large
        proxy_max_temp_file_size 512m;
    }

    # Google Maven (common Android/gRPC deps)
    location /google/ {
        proxy_pass https://maven.google.com/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache maven_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Gradle Plugin Portal
    location /gradle-plugins/ {
        proxy_pass https://plugins.gradle.org/m2/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache maven_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
