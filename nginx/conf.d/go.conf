# go.example.com — Go module proxy cache
# Proxies https://proxy.golang.org and https://sum.golang.org
# Usage: GOPROXY=https://go.example.com,direct
server {
    listen 443 ssl;
    server_name go.example.com;

    include /etc/nginx/includes/ssl-defaults.conf;

    # Module proxy (proxy.golang.org)
    # Handles: $module/@v/list, $module/@v/$version.{info,mod,zip}
    location / {
        proxy_pass https://proxy.golang.org;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache go_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        # Module zips can be large
        proxy_max_temp_file_size 512m;
    }

    # Checksum database (sum.golang.org)
    # Go toolchain queries /lookup, /tile, /latest
    location /sumdb/ {
        proxy_pass https://sum.golang.org/;
        include /etc/nginx/includes/proxy-defaults.conf;
        proxy_cache go_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
