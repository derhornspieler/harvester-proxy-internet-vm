{{- if .Values.gateway.enabled -}}
{{- $fullname := include "proxy-internet.fullname" . -}}
{{- $domain := .Values.domain -}}
{{- $svcName := printf "%s-nginx" $fullname -}}
{{- $gatewayName := $fullname -}}
{{- $hostnames := list "yum" "apt" "apk" "charts" "go" "npm" "pypi" "maven" "crates" "dl" "harbor" -}}
{{- range $hostnames }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-{{ . }}
  labels:
    {{- include "proxy-internet.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ . }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ . }}
  hostnames:
    - "{{ . }}.{{ $domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $svcName }}
          port: 8081
{{- end }}
{{- end }}
