            proxy_cache charts_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }

  go.conf: |
    # go.{{ $domain }} — Go module proxy cache
    server {
        listen 8081;
        server_name go.{{ $domain }};

        location / {
            {{- if $proxyEnabled }}
            proxy_pass https://{{ $proxyIP }};
            {{- else }}
            proxy_pass https://proxy.golang.org;
            {{- end }}
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache go_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_max_temp_file_size 512m;
        }

        location /sumdb/ {
            {{- if $proxyEnabled }}
            proxy_pass https://{{ $proxyIP }};
            {{- else }}
            proxy_pass https://sum.golang.org/;
            {{- end }}
