  harbor.conf: |
    # harbor.{{ $domain }} — Reverse proxy to Harbor service
    server {
        listen 8081;
        server_name harbor.{{ $domain }};

        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        set $harbor_upstream http://harbor-core.harbor.svc.cluster.local:80;

        location / {
            proxy_pass $harbor_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
        }

        location /v2/ {
            proxy_pass $harbor_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }
    }

  {{- if .Values.binaries.enabled }}
  bin.conf: |
    # bin.{{ $domain }} — Static binary file server
    server {
        listen 8081;
        server_name bin.{{ $domain }};

        root /srv/bin;
        autoindex off;

        location / {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=86400, immutable";
        }
    }
  {{- end }}
