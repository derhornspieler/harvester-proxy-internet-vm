  charts.conf: |
    # charts.{{ $domain }} — Helm HTTP repository proxy (11 upstreams)
    server {
        listen 8081;
        server_name charts.{{ $domain }};

        # Internal mirror endpoint — fire-and-forget to helm-sync Service
        set $helm_sync_upstream http://{{ $fullname }}-helm-sync:8888;
        location = /mirror-sync {
            internal;
            proxy_pass $helm_sync_upstream/sync;
            proxy_set_header X-Original-URI $request_uri;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
            proxy_send_timeout 1s;
        }

        # cert-manager
        location /jetstack/ {
            mirror /mirror-sync;
            mirror_request_body off;
            {{- if $proxyEnabled }}
            proxy_pass https://{{ $proxyIP }};
            {{- else }}
            proxy_pass https://charts.jetstack.io/;
            {{- end }}
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache charts_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # cloudnative-pg
        location /cnpg/ {
            mirror /mirror-sync;
            mirror_request_body off;
            {{- if $proxyEnabled }}
            proxy_pass https://{{ $proxyIP }};
            {{- else }}
            proxy_pass https://cloudnative-pg.github.io/charts/;
            {{- end }}
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache charts_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # vault
        location /hashicorp/ {
            mirror /mirror-sync;
            mirror_request_body off;
            {{- if $proxyEnabled }}
            proxy_pass https://{{ $proxyIP }};
            {{- else }}
            proxy_pass https://helm.releases.hashicorp.com/;
            {{- end }}
            include /etc/nginx/includes/proxy-defaults.conf;
            proxy_cache charts_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # harbor
        location /goharbor/ {
            mirror /mirror-sync;
            mirror_request_body off;
            {{- if $proxyEnabled }}
