{{- $fullname := include "proxy-internet.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-nginx-main
  labels:
    {{- include "proxy-internet.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        # JSON structured logging for Loki/Promtail
        log_format json escape=json '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_cache_status":"$upstream_cache_status",'
            '"http_user_agent":"$http_user_agent",'
            '"server_name":"$server_name"'
            '}';

        access_log /dev/stdout json;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 0;

        # Use cluster DNS IP for proxy_pass with variables
        resolver {{ .Values.nginx.dnsResolver }} valid=30s;
        resolver_timeout 5s;

        # Temp paths for non-root
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        fastcgi_temp_path /tmp/fastcgi;
        uwsgi_temp_path /tmp/uwsgi;
        scgi_temp_path /tmp/scgi;

        # Cache declarations
        include /etc/nginx/includes/cache.conf;

        # Health/readiness + stub_status for prometheus exporter
        server {
            listen 8080;
            server_name _;

            location /healthz {
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }

            location /nginx_status {
                stub_status;
            }
        }

        # Virtual hosts
        include /etc/nginx/conf.d/*.conf;
    }
