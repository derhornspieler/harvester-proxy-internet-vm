services:
  nginx:
    image: nginx:1.27-alpine
    container_name: airgap-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - ./certs/server-fullchain.pem:/etc/nginx/certs/server-fullchain.pem:ro
      - ./certs/server-key.pem:/etc/nginx/certs/server-key.pem:ro
      - ./bin/data:/srv/bin:ro
      - nginx-cache-rpm:/var/cache/nginx/rpm
      - nginx-cache-charts:/var/cache/nginx/charts
      - nginx-cache-downloads:/var/cache/nginx/downloads
    depends_on:
      helm-sync:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  helm-sync:
    build: ./helm-sync
    container_name: helm-sync
    restart: unless-stopped
    volumes:
      - ./helm-oci/charts.manifest:/opt/helm-sync/charts.manifest:ro
      - ./certs/ca-chain.pem:/etc/ssl/custom/ca-chain.pem:ro
    environment:
      - HARBOR_HOST=${HARBOR_HOST:-harbor.example.com}
      - HARBOR_USER=${HARBOR_USER:?Set HARBOR_USER in .env}
      - HARBOR_PASS=${HARBOR_PASS:?Set HARBOR_PASS in .env}
      - HELM_SYNC_PORT=8888
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8888/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  registry:
    image: registry:2
    container_name: airgap-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./certs/server-fullchain.pem:/certs/tls.crt:ro
      - ./certs/server-key.pem:/certs/tls.key:ro
      - ./registry/config.yml:/etc/docker/registry/config.yml:ro
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "-O", "/dev/null", "https://localhost:5000/v2/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  nginx-cache-rpm:
  nginx-cache-charts:
  nginx-cache-downloads:
  registry-data:
