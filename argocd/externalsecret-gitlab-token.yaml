---
# ExternalSecret: sync ArgoCD GitLab PAT from Vault
# Replaces the manually-created argocd-gitlab-token secret
# Vault path: kv/services/argocd (key: pat)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-gitlab-token
  namespace: argocd
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: argocd-gitlab-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: kv/services/argocd
        property: pat
