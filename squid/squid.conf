# Forward HTTP/HTTPS proxy for airgap environments
# Allows cluster workloads to reach the internet via proxy.example.com:3128
# Also supports HTTPS via CONNECT tunneling on port 3128

# ACL definitions
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 8080
acl Safe_ports port 8443
acl CONNECT method CONNECT

# Access controls
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access deny all

# Listener — plain HTTP proxy (clients use HTTP_PROXY=http://proxy:3128)
http_port 3128

# Cache settings (10GB disk cache)
cache_dir ufs /var/spool/squid 10000 16 256
maximum_object_size 512 MB
cache_mem 256 MB

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# DNS
dns_nameservers 8.8.8.8 1.1.1.1

# Timeouts
connect_timeout 30 seconds
read_timeout 300 seconds

# Identification
visible_hostname proxy.example.com
