---
# GitLab CI for harvester-proxy-internet-vm
# Lint + security scan + validate + sync to GitHub

stages:
  - lint
  - security
  - validate
  - sync

default:
  tags:
    - shared

variables:
  DOMAIN: example.com

# ---------------------------------------------------------------------------
# Lint stage
# ---------------------------------------------------------------------------

shellcheck:
  stage: lint
  image: harbor.aegisgroup.ch/docker.io/koalaman/shellcheck:latest
  script:
    - |
      find . -name '*.sh' -not -path './.git/*' -print0 \
        | xargs -0 shellcheck -S warning -e SC1090 -e SC1091
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

hadolint:
  stage: lint
  image: harbor.aegisgroup.ch/docker.io/hadolint/hadolint:latest-alpine
  script:
    - hadolint helm-sync/Dockerfile
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

yamllint:
  stage: lint
  image: harbor.aegisgroup.ch/docker.io/library/alpine:3.21
  before_script:
    - apk add --no-cache yamllint
  script:
    - |
      yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: {check-keys: false}}}' \
        docker-compose.yaml registry/config.yml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Security stage
# ---------------------------------------------------------------------------

gitleaks:
  stage: security
  image: harbor.aegisgroup.ch/docker.io/zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: false

semgrep-sast:
  stage: security
  image: harbor.aegisgroup.ch/docker.io/semgrep/semgrep:latest
  script:
    - >-
      semgrep scan
      --config auto
      --config p/owasp-top-ten
      --config p/docker
      --config p/nginx
      --error
      --json -o semgrep-results.json .
  artifacts:
    when: always
    paths:
      - semgrep-results.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Validate stage
# ---------------------------------------------------------------------------

nginx-config:
  stage: validate
  image: harbor.aegisgroup.ch/docker.io/library/docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - mkdir -p /tmp/certs
    - |
      apk add --no-cache openssl
      openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
        -keyout /tmp/certs/server-key.pem -out /tmp/certs/server-fullchain.pem \
        -days 1 -nodes -subj '/CN=test'
    - |
      docker run --rm \
        -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
        -v "$PWD/nginx/conf.d:/etc/nginx/conf.d:ro" \
        -v "$PWD/nginx/includes:/etc/nginx/includes:ro" \
        -v "/tmp/certs/server-fullchain.pem:/etc/nginx/certs/server-fullchain.pem:ro" \
        -v "/tmp/certs/server-key.pem:/etc/nginx/certs/server-key.pem:ro" \
        nginx:1.27-alpine nginx -t
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

docker-compose:
  stage: validate
  image: harbor.aegisgroup.ch/docker.io/library/docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    HARBOR_HOST: harbor.example.com
    HARBOR_USER: ci-test
    HARBOR_PASS: ci-test
  script:
    - docker compose config --quiet
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

helm-lint:
  stage: validate
  image: harbor.aegisgroup.ch/docker.io/alpine/helm:3.17.1
  script:
    - helm lint chart/
    - helm template test chart/ > /dev/null
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Deploy stage — ArgoCD ApplicationSet refresh
# ---------------------------------------------------------------------------
# ArgoCD watches the 'deploy' branch via the infra-platform-services
# ApplicationSet (SCM provider generator). This job uses the ArgoCD API
# to trigger an immediate refresh.
# Credentials sourced from Vault (kv/ci/argocd) via GitLab JWT auth.

argocd-refresh:
  stage: sync
  rules:
    - when: never  # Disabled until ArgoCD deployment is ready
  image: harbor.aegisgroup.ch/docker.io/library/alpine:3.21
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.aegisgroup.ch
  secrets:
    ARGOCD_SERVER:
      vault: ci/argocd/server@kv
    ARGOCD_USERNAME:
      vault: ci/argocd/username@kv
    ARGOCD_PASSWORD:
      vault: ci/argocd/password@kv
  variables:
    VAULT_SERVER_URL: https://vault.aegisgroup.ch
    VAULT_AUTH_ROLE: gitlab-ci
  before_script:
    - apk add --no-cache curl
  script:
    - |
      ARGOCD_TOKEN=$(curl -sSf -k \
        -X POST "https://${ARGOCD_SERVER}/api/v1/session" \
        -H 'Content-Type: application/json' \
        -d "{\"username\":\"${ARGOCD_USERNAME}\",\"password\":\"${ARGOCD_PASSWORD}\"}" \
        | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
    - |
      curl -sSf -k \
        -X GET "https://${ARGOCD_SERVER}/api/v1/applicationsets/infra-platform-services" \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        -o /dev/null
    - echo "ArgoCD ApplicationSet refresh triggered"

# ---------------------------------------------------------------------------
# Sync: Sanitized push to GitHub mirror (on push to main)
# ---------------------------------------------------------------------------
# Replaces PII (domain, usernames, org, IPs) with generic placeholders and
# removes sensitive files before pushing to the public GitHub mirror.
# Credentials fetched from Vault via JWT auth — no CI variables needed.
# Vault path: kv/services/ci/github-mirror-proxy-vm (ssh-private-key, mirror-url)
sync-to-github:
  stage: sync
  image: harbor.aegisgroup.ch/docker.io/library/alpine:3.21
  id_tokens:
    VAULT_JWT:
      aud: https://gitlab.aegisgroup.ch
  variables:
    VAULT_ADDR: http://vault.vault.svc.cluster.local:8200
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  before_script:
    - apk add --no-cache git openssh-client python3 py3-pip curl jq
    - pip install git-filter-repo --break-system-packages 2>/dev/null
    # Authenticate to Vault via JWT
    - |
      VAULT_TOKEN=$(curl -s --request POST \
        --data "{\"jwt\": \"${VAULT_JWT}\", \"role\": \"gitlab-ci\"}" \
        "${VAULT_ADDR}/v1/auth/jwt/login" | \
        jq -r '.auth.client_token')
      export VAULT_TOKEN
      if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
        echo "ERROR: Failed to authenticate to Vault"
        exit 1
      fi
    # Fetch GitHub SSH key and mirror URL from Vault
    - |
      VAULT_RESP=$(curl -sk -H "X-Vault-Token: ${VAULT_TOKEN}" \
        "${VAULT_ADDR}/v1/kv/data/services/ci/github-mirror-proxy-vm")
      GITHUB_SSH_PRIVATE_KEY=$(echo "$VAULT_RESP" | jq -r '.data.data["ssh-private-key"]')
      GITHUB_MIRROR_URL=$(echo "$VAULT_RESP" | jq -r '.data.data["mirror-url"]')
      if [ -z "${GITHUB_MIRROR_URL}" ] || [ "${GITHUB_MIRROR_URL}" = "null" ]; then
        echo "ERROR: Failed to read GitHub mirror URL from Vault"
        exit 1
      fi
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
    - git config --global user.name "GitLab Mirror"
    - git config --global user.email "mirror@ci.local"
    - git config --global http.sslVerify false
  script:
    - |
      WORK_DIR="/tmp/github-sanitize"
      rm -rf "${WORK_DIR}"

      # Clone the full repo
      git clone --branch main "${CI_REPOSITORY_URL}" "${WORK_DIR}"
      cd "${WORK_DIR}"

      # Create PII replacement map
      cat > /tmp/replacements.txt << 'REPLACEMENTS'
      aegisgroup.ch==>example.com
      Aegis Group==>Example Org
      alice.morgan==>admin.user
      Alice Morgan==>Platform Admin
      frank.jones==>dev.user
      Frank Jones==>Senior Developer
      172.16.3.200==>10.0.0.100
      192.168.48.2==>10.0.0.200
      192.168.48.4==>10.0.0.201
      Harbor12345==>CHANGEME
      REPLACEMENTS

      # Pass 1: Replace PII in file content + remove sensitive files
      git filter-repo \
        --replace-text /tmp/replacements.txt \
        --path-glob 'scripts/github-sanitize.sh' --invert-paths \
        --path-glob '.gitlab-ci.yml' --invert-paths \
        --path-glob 'certs/*.pem' --invert-paths \
        --path-glob 'certs/*.srl' --invert-paths \
        --path-glob 'terraform/terraform.tfvars' --invert-paths \
        --path-glob '.env' --invert-paths \
        --path-glob '.claude/' --invert-paths \
        --path-glob 'CLAUDE.md' --invert-paths \
        --path-glob 'memory/' --invert-paths \
        --path-glob 'docs/plans/' --invert-paths \
        --path-glob 'docs/superpowers/' --invert-paths \
        --force

      # Pass 2: Replace PII in commit messages
      git filter-repo \
        --message-callback '
      msg = message
      msg = msg.replace(b"aegisgroup.ch", b"example.com")
      msg = msg.replace(b"Aegis Group", b"Example Org")
      msg = msg.replace(b"alice.morgan", b"admin.user")
      msg = msg.replace(b"Alice Morgan", b"Platform Admin")
      msg = msg.replace(b"frank.jones", b"dev.user")
      msg = msg.replace(b"Frank Jones", b"Senior Developer")
      msg = msg.replace(b"172.16.3.200", b"10.0.0.100")
      msg = msg.replace(b"Harbor12345", b"CHANGEME")
      return msg
      ' --force

      # Force push sanitized history to GitHub
      git remote add github "${GITHUB_MIRROR_URL}"
      git push github main --force --tags
  allow_failure: true
